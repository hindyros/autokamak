# Phase-1 prompt: agent-driven parameter sweep that builds a small training
# dataset for downstream surrogate-model AutoML.
#
# Run with the venv activated and .env loaded:
#   set -a && source .env && set +a
#   source venv/bin/activate
#   PYTHONPATH=src/autotokamak python -m agent.runners.plan_execute_feedback \
#       --config src/autotokamak/agent/prompts/dataset_generation.yaml
#
# Scope: fixed-boundary Grad-Shafranov, TokaMaker default profiles,
# 5 physics inputs (R0, a, kappa, delta, Ip). Target N = 500 samples so
# the Phase-2 surrogate has enough data to differentiate model families
# and to beat the mean-predictor baseline decisively.
# See docs/project_agenda.md for the full project context.

problem: |
  TITLE
    Build a small physics-parameter dataset of fixed-boundary Grad-Shafranov
    equilibria for downstream surrogate-model training.

  CONTEXT
    The `autotokamak` package is already installed (importable as
    `autotokamak`). Reuse `autotokamak.core` — do not re-implement TokaMaker
    glue or invent function names. A working single-equilibrium reference
    lives at `examples/config_driven_equilibrium/run_equilibrium_from_config.py`.

    OpenFUSIONToolkit is pip-installed; do not look for it under ./

  API REFERENCE (the only calls you should make into the core library)

    # autotokamak.core.geometry
    build_lcfs(*, r0: float, z0: float, a: float, kappa: float, delta: float,
               npts: int = 80) -> np.ndarray         # shape (npts, 2): (R, Z) contour
    build_mesh(lcfs: np.ndarray, *, mesh_dx: float,
               region_name: str = "plasma", region_tag: str = "plasma"
              ) -> tuple[gs_mesh, mesh_pts, mesh_lc, mesh_reg]
              # mesh_pts: (N_nodes, 2); mesh_lc: (N_tri, 3) int; mesh_reg: (N_tri,)

    # autotokamak.core.solver
    solve_equilibrium(*, mesh_pts, mesh_lc, mesh_reg, lcfs, cfg) -> gs
              # gs is a solved TokaMaker. Safe to call repeatedly in a loop —
              # the OFT_env singleton is now cached internally.
              # gs.get_psi() returns a 1-D float array of length len(mesh_pts)
              # when solver.order == 1 (the node values, ready for interpolation).
    get_last_solve_info() -> dict
              # Status of the most recent solve_equilibrium call. Keys:
              #   isoflux_used         : bool -- whether the isoflux constraint
              #                                  fitting was applied (always
              #                                  False for fixed-boundary).
              #   fallback_reason      : str | None
              #   boundary_enforced_by : str  -- "mesh" for fixed-boundary
              #                                  solves (LCFS enforced exactly
              #                                  by the mesh boundary).
              # CALL THIS AFTER EVERY solve_equilibrium AND RECORD isoflux_used
              # PER SAMPLE in the HDF5 output (see DELIVERABLES). For this
              # fixed-boundary task isoflux_used=False on every sample is
              # CORRECT AND EXPECTED — see ISOFLUX NOTE below.

  CONFIG-DICT SCHEMA (what `solve_equilibrium`'s `cfg` arg must look like)
    {
      "equation": {"name": "gs"},
      "boundary": {"type": "isoflux",
                   "r0": <float>, "z0": <float>, "a": <float>,
                   "kappa": <float>, "delta": <float>, "npts": <int>},
      "mesh":     {"method": "gs_domain",
                   "regions": [{"name": "plasma", "type": "plasma", "dx": <float>}]},
      "solver":   {"order": 1, "F0": 0.10752, "free_boundary": False},
      "targets":  {"Ip": <float>, "Ip_ratio": 1.0},
      "init_psi": {"method": "isoflux"},
      # "isoflux" seeds the nonlinear GS solve with a shape-aware ψ derived
      # from (r0, z0, a, kappa, delta) — a better initial guess than
      # "tokamaker_default" for shaped plasmas. Unrelated to the isoflux
      # CONSTRAINT (a free-boundary mechanism) — see ISOFLUX NOTE below.
    }

  ISOFLUX NOTE (read before declaring done)
    This is a FIXED-BOUNDARY task: the LCFS you request is the mesh
    boundary, and the solver enforces psi = const there exactly, by
    construction. OFT's isoflux constraint fitting is a FREE-BOUNDARY
    mechanism (it adjusts coil currents); on a plasma-only mesh there are
    no coils, so it does not apply here. core/solver.py therefore skips
    the constraint entirely for fixed-boundary solves and reports
    isoflux_used=False with boundary_enforced_by="mesh" — this is the
    CORRECT outcome, not a failure. (Root-caused 2026-07-10: the earlier
    "Isoflux fitting failed" fallback was a singular fitting system with
    zero coil-current unknowns, not a physics bug.)

    Your job here is:
      - Record `get_last_solve_info()["isoflux_used"]` per sample into
        /outputs/isoflux_used (it will be False for every sample; the
        field is kept for schema compatibility with free-boundary
        datasets).
      - A sample is `success=True` iff solve_equilibrium returned a
        solved TokaMaker AND the psi interpolation produced a
        finite-valued (R,Z) grid.
      - The requested LCFS shape IS honored on every successful sample —
        the mesh boundary is the LCFS to within mesh resampling
        tolerance (~mesh_dx/50).
    Print a one-line summary at the end including the isoflux fraction,
    e.g.: "Wrote dataset.h5: 495/500 succeeded (isoflux_used: 0/500,
    fixed-boundary)"

  PSI -> (R, Z) GRID INTERPOLATION
    psi_nodes = np.asarray(gs.get_psi(False), dtype=float).ravel()
    # get_psi(False) = PHYSICAL psi in Webers — REQUIRED. The default
    # gs.get_psi() returns per-sample NORMALIZED flux (psi_N in [0,1]),
    # which erases the Ip dependence and makes one of the five inputs
    # useless for surrogate training.
    # When solver.order == 1, len(psi_nodes) == len(mesh_pts) exactly.
    tri = matplotlib.tri.Triangulation(mesh_pts[:, 0], mesh_pts[:, 1],
                                        triangles=mesh_lc)
    interp = matplotlib.tri.LinearTriInterpolator(tri, psi_nodes)
    RR, ZZ = np.meshgrid(R, Z, indexing="xy")    # shape (nz, nr)
    psi_grid = np.asarray(interp(RR, ZZ).filled(np.nan), dtype=np.float64)

  GOAL
    Produce one working example workspace under `examples/dataset_generation/`
    that reads a YAML config and writes a small dataset of fixed-boundary
    Grad-Shafranov solutions. Three files only (see DELIVERABLES). The
    pipeline must be config-driven (no hardcoded ranges in the .py file) and
    MUST generate diagnostic plots automatically while data is being created.

  WORKING DIRECTORY
    Your current working directory IS the workspace. Write all files
    DIRECTLY in the current directory (e.g. `./dataset_config.yaml`,
    `./run_dataset_sweep.py`). Do NOT create a subdirectory named
    `examples/` or `dataset_generation/` - those names refer to where
    your CWD already is.

  DELIVERABLES (exactly three files, written in the current directory)
    1. `dataset_config.yaml` - one concrete config with:
         sampling: { method: "lhs", n_samples: 500, seed: 0 }
         parameters (low, high):
           r0:    0.35  - 0.55     (m, major radius)
           a:     0.10  - 0.20     (m, minor radius)
           kappa: 1.0   - 1.6      (elongation)
           delta: 0.0   - 0.4      (triangularity)
           Ip:    80000 - 200000   (A, plasma current)
         fixed:  z0=0.0, F0=0.10752, npts=80, mesh_dx=0.015,
                 solver_order=1, Ip_ratio=1.0
                 # solver_order=1 keeps len(get_psi()) == len(mesh_pts) so
                 # the LinearTriInterpolator works directly with no DOF surgery.
         output_grid:                             # EXACT schema — meta-loop's
           R: {min: 0.15, max: 0.80, n: 64}       #   regen_dataset action
           Z: {min: -0.40, max: 0.40, n: 96}      #   parses this via
                                                  #   autotokamak.data.schema.SweepConfig.
                                                  # Use capital R/Z and min/max/n
                                                  # keys EXACTLY — the pydantic
                                                  # schema rejects lowercase r/z or
                                                  # low/high/npts variants.
         output_path: "outputs/dataset.h5"        # top-level, matches SweepConfig
         plotting:
           enabled: true
           every_n_samples: 1
           output_dir: "outputs/plots"

    2. `run_dataset_sweep.py` - the runner. Takes a config path as its sole
       CLI arg. For each sample:
         - sample parameters (use scipy.stats.qmc.LatinHypercube for "lhs",
           seeded; numpy.random.default_rng for "uniform")
         - build LCFS + mesh via autotokamak.core.geometry
         - solve via autotokamak.core.solver.solve_equilibrium
         - interpolate psi onto the common (R, Z) grid using
           matplotlib.tri.LinearTriInterpolator (fall back to
           scipy.interpolate.griddata if needed)
         - on failure, log the exception and continue; fill NaN/False rows
         - if plotting.enabled is true, write/update plots in plotting.output_dir:
             * running-success plot (success fraction vs completed sample)
             * sampled-parameter scatter/diagnostic view
             * latest successful psi(R,Z) image
       After the loop, write one HDF5 file with this minimum layout:
         /grid/R, /grid/Z                          : 1-D coordinate arrays
         /inputs/r0, /a, /kappa, /delta, /Ip       : (N,) float64
         /outputs/psi                              : (N, nz, nr) float64
         /outputs/success                          : (N,) bool
         /outputs/isoflux_used                     : (N,) bool
             # Per-sample value of get_last_solve_info()["isoflux_used"],
             # captured immediately after each solve_equilibrium call.
             # For a failed sample, write False.
       Also write final summary plots to plotting.output_dir (at minimum:
       input-distribution histogram(s) and success/failure counts).
       Print a one-line summary at the end: "Wrote dataset.h5: M/N succeeded".

    3. `README.md` - 20-40 lines: what the example produces, how to run it,
       and the dataset layout. Include a short "Plots" section listing which
       plot files are generated and where they are written.

  CONSTRAINTS
    * Do NOT add a verifier script, test suite, CI config, .gitignore,
      atomic-finalize logic, checkpoint/resume support, progress bar, or any
      other extras beyond the three files above. PoC, not production.
    * Do not run `pip install` or modify the environment.
    * Do not call `git`.
    * Do not prompt for user input; the task is autonomous.
    * Reuse `autotokamak.core` modules; do not re-implement TokaMaker glue.
    * Only one OFT_env per Python process - rely on
      autotokamak.core.solver's machinery for this.
    * After writing the files, RUN `python run_dataset_sweep.py
      dataset_config.yaml` from your current directory and verify that
      `./outputs/dataset.h5` is created. The shell's `python` already
      resolves to the project venv (Python 3.11) with all required
      packages: numpy, scipy, h5py, matplotlib, pyyaml, autotokamak,
      OpenFUSIONToolkit. If you ever see ModuleNotFoundError for any of
      these, the venv is misconfigured upstream - do NOT try to pip
      install; report the error and stop.
    * If errors arise during the sweep, fix the code and re-run.
      Do not redesign the deliverables.
    * The three DELIVERABLE files at the workspace ROOT must be exactly:
        dataset_config.yaml, run_dataset_sweep.py, README.md
      plus the runner-produced outputs/ directory. If you wrote any helper
      script, verifier, REPRODUCIBILITY.md, smoke test, integrity checker, or
      other scratch file during iteration, DELETE it before finishing.
      DO NOT touch these paths — they are URSA infrastructure and moving/
      renaming/deleting them will crash the agent runtime mid-run:
        - graph_store.sqlite   (URSA's live SQLite; keep at root)
        - ursa_metrics/        (URSA's per-step logs; keep at root)
      A prior run explicitly ran `rm graph_store.sqlite` because it was not
      on the deliverables list. That killed the runtime. The URSA files
      being present is EXPECTED and correct.
      Run `ls` at the end and confirm the three deliverable files are present.
    * RECORD (but DO NOT enforce) isoflux_used. Per the ISOFLUX NOTE
      above, fixed-boundary solves never apply the isoflux constraint —
      the mesh boundary enforces the shape exactly. Write
      /outputs/isoflux_used truthfully (False for every sample here) and
      DO NOT treat it as a failure; success is defined by the solver
      returning a valid TokaMaker + a finite psi(R,Z) interpolation.
      A run where 500/500 samples have success=True and
      isoflux_used=False is the expected correct outcome.

workspace: examples/dataset_generation
model: openai:gpt-5.2

feedback_rounds: 2

# Workspace hygiene: consumed by plan_execute_feedback to warn the planner
# about extras between rounds. Any file at the workspace ROOT not on
# allowed_root_files AND not on infra_root_files is flagged.
allowed_root_files:
  - dataset_config.yaml
  - run_dataset_sweep.py
  - README.md
  - outputs                 # directory holding the agent's artifacts
infra_root_files:
  - graph_store.sqlite      # URSA's live SQLite (write; do not touch)
  - ursa_metrics            # URSA per-step logs
  - __pycache__             # Python bytecode cache

symlinks:
  - source: ./ursa
    dest: ursa
  - source: ./OpenFUSIONToolkit
    dest: OpenFUSIONToolkit
