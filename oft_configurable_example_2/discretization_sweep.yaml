# Discretization sweep specification for the config-driven OFT/TokaMaker equilibrium example.
#
# Purpose
# -------
# This file is a *machine-usable* prompt/spec for exploring new discretizations and
# related settings by generating one or more derived configs and running
#   python run_equilibrium.py --config <derived_config.yaml>
#
# Baseline
# --------
# The baseline configuration is discretization_config.yaml.
# Each case below applies a set of YAML "overrides" to the baseline.
#
# What counts as a discretization change?
# -------------------------------------
# - mesh: mesh.method (e.g. gs_domain), mesh.dx, and boundary polygon resolution (geometry.lcfs.n_pts)
# - solver discretization: solver.order (FE polynomial order)
# - solver settings that affect numerical behavior: solver.settings.* (tolerances, iteration caps, etc.)
# - (optional) physics target discretization: isoflux constraint sampling fraction
#
# Required fields per sweep item
# ------------------------------
# - id: unique short name; used for output folder naming.
# - overrides: YAML subtree merged into baseline config (deep-merge).
#
# Metrics computed and recorded (in outputs/<id>/summary.yaml)
# ----------------------------------------------------------
# - solve_ok: whether TokaMaker.solve() returned without raising
# - psi_finite: whether the exported psi on nodes is finite
# - runtime_sec: wallclock time of run
# - optional: target results if available from API (best-effort)
#
# Acceptance criteria
# -------------------
# - must complete without unhandled exception
# - solve_ok == true
# - psi_finite == true
#
# Notes
# -----
# Some OFT builds can fail to converge for certain target/isoflux settings.
# If you see frequent failures, try:
# - increasing geometry.lcfs.n_pts (better boundary resolution)
# - decreasing mesh.dx (finer mesh)
# - lowering physics.isoflux.frac (fewer constraints)
# - adjusting solver.order (1 vs 2)
# - increasing solver.settings.maxits / relax tolerances

baseline_config: discretization_config.yaml

automation:
  # If true, the downstream agent should create derived config files under ./sweeps/
  # and run each case.
  create_derived_configs: true
  derived_config_dir: sweeps
  run_command_template: "python run_equilibrium.py --config {config}"

cases:
  - id: dx_0p02_order1
    overrides:
      mesh:
        dx: 0.02
      solver:
        order: 1

  - id: dx_0p01_order1
    overrides:
      mesh:
        dx: 0.01
      solver:
        order: 1

  - id: dx_0p015_order2
    overrides:
      mesh:
        dx: 0.015
      solver:
        order: 2

  - id: boundary_512pts_dx_0p015
    overrides:
      geometry:
        lcfs:
          n_pts: 512
      mesh:
        dx: 0.015

  - id: isoflux_frac_0p2
    overrides:
      physics:
        isoflux:
          enabled: true
          frac: 0.2

  - id: isoflux_frac_0p05
    overrides:
      physics:
        isoflux:
          enabled: true
          frac: 0.05
