# OpenFUSIONToolkit / TokaMaker equilibrium example driven by a single config file.
#
# This example solves the Grad–Shafranov equation for a simple analytic plasma
# boundary (LCFS) generated by TokaMaker.util.create_isoflux().
#
# Notes:
# - The mesh is built via TokaMaker.meshing.gs_Domain with ONE plasma region.
# - Physics targets are specified via global targets (Ip, Ip_ratio) and F0.
# - Profiles: this example uses TokaMaker defaults unless you provide profiles.
#
metadata:
  name: oft_gs_isoflux_default_profiles
  description: |
    Config-driven Grad–Shafranov equilibrium with analytic LCFS and default profiles.

io:
  output_dir: outputs
  save_plots: true

# Which equation/solver family to use
# (This example runner currently implements only grad_shafranov via TokaMaker.)
equation:
  type: grad_shafranov

# Geometry definition (analytic LCFS)
geometry:
  lcfs:
    type: create_isoflux
    # create_isoflux(npts, r0, z0, a, kappa, delta)
    r0: 1.70
    z0: 0.00
    a: 0.50
    kappa: 1.70
    delta: 0.30
    n_pts: 120

# Discretization / mesh
mesh:
  method: gs_domain
  regions:
    plasma:
      dx: 0.05
  # If you add vacuum/boundary regions later, extend this config and the runner.

# Physics parameters / targets
physics:
  F0: 5.0          # vacuum F(psi) value = B0*R0 [T*m]

  # Total plasma current target [A].
  # To DISABLE Ip targeting (use solver defaults), set to -1.0e99.
  Ip: -1.0e99

  # Relative FF' vs P' contribution.
  # To DISABLE, set to -1.0e99.
  Ip_ratio: -1.0e99

  # Constrain the LCFS as an isoflux boundary using the same points that defined it.
  # If disabled, the problem can be underconstrained.
  isoflux:
    enabled: false
    frac: 0.3

profiles:
  use_defaults: true
  # If use_defaults=false, you may provide:
  # pp_prof: {type: linterp, x: [...], y: [...]}
  # ffp_prof:{type: linterp, x: [...], y: [...]}
  # foffset: <float>   # optional offset for F

solver:
  fe_order: 2
  # additional settings to patch into mygs.settings (TokaMaker settings struct)
  # keys must match attributes on mygs.settings.
  settings:
    maxits: 40
    nl_tol: 1.0e-8
    urf: 0.2

# Quantitative definition-of-done checks
# If allow_fail=false (default), the script exits nonzero if checks.pass == false.
checks:
  allow_fail: true        # set false when you have a config that converges reliably
  require_finite_psi: false
  targets:
    enabled: false
    rtol: 5.0e-2          # relative tolerance for target comparisons (when available in stats)
    atol: 0.0

postprocess:
  export:
    write_native_mesh: true
    write_summary: true
    write_psi_on_nodes: true
  plots:
    mesh: true
    psi_contours: true
