metadata:
  name: oft_gs_isoflux_default_profiles
  description: "Config-driven Grad\u2013Shafranov equilibrium with analytic LCFS and\
    \ default profiles.\n"
io:
  output_dir: outputs
  save_plots: true
equation:
  type: grad_shafranov
geometry:
  lcfs:
    type: create_isoflux
    r0: 1.7
    z0: 0.0
    a: 0.5
    kappa: 1.7
    delta: 0.3
    n_pts: 512
mesh:
  method: gs_domain
  regions:
    plasma:
      dx: 0.05
  dx: 0.015
physics:
  F0: 5.0
  Ip: -1.0e99
  Ip_ratio: -1.0e99
  isoflux:
    enabled: false
    frac: 0.3
profiles:
  use_defaults: true
solver:
  fe_order: 2
  settings:
    maxits: 40
    nl_tol: 1.0e-08
    urf: 0.2
checks:
  allow_fail: true
  require_finite_psi: false
  targets:
    enabled: false
    rtol: 0.05
    atol: 0.0
postprocess:
  export:
    write_native_mesh: true
    write_summary: true
    write_psi_on_nodes: true
  plots:
    mesh: true
    psi_contours: true
case:
  name: boundary_512pts_dx_0p015
