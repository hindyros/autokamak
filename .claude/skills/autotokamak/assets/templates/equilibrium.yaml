# Equilibrium config template — one solve.
#
# Consumed by:
#   python examples/config_driven_equilibrium/run_equilibrium_from_config.py <this file>
#
# Validated by autotokamak.core.schema.EquilibriumConfig. Any unknown top-level
# key rejects; unknown keys under `outputs:` are permitted (legacy provenance).
#
# Copy this file, edit the values, drop it under examples/<your-example>/.

equation:
  name: gs                    # only "gs" supported

boundary:
  type: isoflux               # only "isoflux" (analytic D-shape) supported
  npts: 80                    # 0 < npts <= 1000; <40 risks self-intersecting LCFS
  r0: 0.42                    # major radius of LCFS center (m)
  z0: 0.0                     # vertical center of LCFS (m)
  a:  0.15                    # minor radius (m)
  kappa: 1.4                  # elongation, 0.5..3.0 (1.0 = circle, 1.6 ≈ ITER)
  delta: 0.0                  # triangularity, -1.0..1.0 (positive = inward D)

mesh:
  method: gs_domain
  regions:
    - name: plasma
      type: plasma
      dx: 0.015               # triangle edge (m). <0.010 gets expensive fast.

solver:
  order: 2                    # FE polynomial order, 1..3
  F0: 0.10752                 # toroidal-field constant (T·m)
  full_domain: false          # false = solve half-plane, reflect
  maxits: 60                  # nonlinear iteration cap
  free_boundary: false        # not yet supported by this template

targets:
  # AT LEAST ONE of Ip, Ip_ratio, pax, estore, R0, V0 must be set.
  Ip: 120000.0                # plasma current (A)
  Ip_ratio: 1.0

init_psi:
  method: tokamaker_default   # or "isoflux" (shape-aware; can fail on extreme κ/δ)

outputs:
  out_dir: outputs
  mesh_png: mesh.png
  psi_png: psi.png

meta:                         # ignored by loader; free-form provenance
  oft_version_min: "1.0.0"
  authored_by: autotokamak-skill
