# Structural reference for the config file the agent creates (example keys only).
discretization_config_schema: |
  # Example schema for the discretization/run config file. - Use these values to be used in the config file you create
  # The agent creates the actual config in the workspace; this is reference only.

  equation: "grad_shafranov"   # Which equation to solve (e.g. grad_shafranov for TokaMaker)
  fixed_boundary: true         # true = fixed-boundary (prescribed LCFS); false = free-boundary

  model:
    type: gs_plasma

  # --- Boundary: LCFS from create_isoflux(R0, Z0, a, kappa, delta) ---
  # OFT create_isoflux(n_pts, R0, Z0, a, kappa, delta).
  boundary:
    type: "isoflux"           # or "polygon" with explicit points
    R0: 0.42                  # Major radius (m)
    Z0: 0.0                   # Vertical center (m)
    a: 0.15                   # Minor radius (m)
    kappa: 1.4                # Elongation
    delta: 0.4                # Triangularity
    n_pts: 80                 # Number of points on LCFS contour

  # --- Physics ---
  physics:
    F0: 0.10752               # Toroidal field scale R*Bt (T·m)
    targets:
      Ip: 120000              # Plasma current (A)
      Ip_ratio: 1.0           # 1/Beta_target - 1; 1.0 corresponds to Beta_target = 0.5

  # --- Discretization ---
  mesh:
    method: "gs_domain"       # how to build mesh: gs_domain = single plasma region, LCFS as boundary
    dx: 0.015                 # target edge size (m); used by define_region when method is gs_domain
  order: 2                    # Finite element order for TokaMaker (e.g. 2 = quadratic)

  other avaialable methods 
  mygs = TokaMaker(myOFT)
  gs_mesh.plot_mesh(fig,ax)
  mygs.plot_psi(fig,ax)
  mygs.init_psi()  # as in docs (initial flux before solve)


  # --- Solver / runtime ---
  nthreads: 2
  maxits: null                # Max Newton iterations (null = use solver default)


problem: |
  TITLE: OpenFUSIONToolkit equilibrium example with configurable discretization

  You have access to OpenFUSIONToolkit (OFT), a suite of modeling tools for plasma and fusion,
  in ./OpenFUSIONToolkit/. You also have URSA (agentic toolkit) in ./ursa/.

  Implement the workflow using only:
  - The OpenFUSIONToolkit Python API (TokaMaker, meshing, util modules as needed)
  - OFT documentation in ./OpenFUSIONToolkit/src/examples and https://openfusiontoolkit.github.io/OpenFUSIONToolkit/docs/v1.0.0-beta7/index.html 
  - The config file defines the equation, parameters, and discretisation variables. The script
    reads the config and uses it to build geometry/mesh, configure the solver, set targets,
    solve, and postprocess — without hardcoding problem or discretisation details.

  TASKS:
    1. Create an equilibrium example that is driven by a CONFIG FILE.
       The runnable script must NOT hardcode the equation, physics parameters, or discretisation.
       It must read them from a single config file (YAML or JSON) that you also create.

    2. The config file MUST specify the equation, the parameters of the problem, and the
       discretisation variables. Use the discretization_config_schema in this config (above)
       as a structural reference. The example is the analytic case: LCFS from create_isoflux
       (R0, Z0, a, kappa, delta, n_pts), F0, Ip, Ip_ratio, no custom profiles (TokaMaker defaults),
       mesh_dx e.g. 0.015. If parameters are missing to fully define the example, add them and
       document (e.g. in comments or README).

    3. Deliverables:
       - A config file (e.g. discretization_config.yaml) that defines the equation, parameters,
         and discretisation for the example. Include comments or a short README explaining
         each key. Add any further keys needed to specify the precise example you are solving.
       - A single Python script that loads the config and uses the equation, parameters, and
         discretisation variables from it to choose and configure the solver, build geometry
         and mesh, set targets, run the solver, and write outputs. Do not hardcode problem
         or discretisation details — read everything from the config.
       - A short README.md that explains what the example does and how to run it
         (e.g. python run_equilibrium.py --config discretization_config.yaml).
       - A new YAML prompt file (e.g. run_new_discretizations.yaml) that a downstream agent
         can use as its task. The prompt must instruct the agent to: (1) look over the
         example (the script, config schema, and README), (2) create one or more new
         discretisation config(s)—varying equation, parameters, or discretisation as
         desired—and (3) run the Python script with each new config. The YAML should be
         self-contained (problem, workspace, and any needed context) so that when an agent
         is given this prompt it can create new configs and run the script without the
         original problem text.
       - Keep the generated number of files to a minimum just the necessary files listed above, no need to include schema validators or config validators, keep code concise and readable. 
       - You can have an output folder to test the examples with the config you created, make sure to include mesh and equilibrium plots too. 
       - The script must build the mesh according to the method in the config (e.g. mesh.method). When mesh.method is gs_domain, use gs_Domain function with a single plasma region and the LCFS as the boundary.

    4. You must RUN the example with the config you created and fix any errors until it completes.
       Do not hardcode parameters in the script; the script must use the config file.

  CONSTRAINTS:
    * Do NOT write into ./ursa/ or ./OpenFUSIONToolkit/; treat them as read-only.
    * Do not use the 'git' command.
    * Do not modify the Python environment; use only packages from requirements.txt.
    * OpenFUSIONToolkit binary and PYTHONPATH are already set up; do not validate or reinstall.
    * Do not prompt the user for input; the task is autonomous.
    * You may search the web only for OFT/TokaMaker API or relevant physics if needed.

workspace: oft_configurable_example_2
model: openai:gpt-5.2

symlinks:
  - source: ./ursa
    dest: ursa
  - source: ./OpenFUSIONToolkit
    dest: OpenFUSIONToolkit
